<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{background:#000;margin:0;height:100vh;display:flex;justify-content:center;align-items:center;font-family:sans-serif}.card{border:2px solid #4ade80;background:#0d0d0d;padding:30px;border-radius:20px;width:320px;text-align:center;box-shadow:0 0 25px rgba(74,222,128,0.4)}.title{color:#4ade80;font-weight:700;font-size:18px;letter-spacing:2px;margin-bottom:20px;text-shadow:0 0 10px #4ade80}input,select{width:100%;background:#111;border:1px solid #4ade80;color:#4ade80;padding:12px;margin-bottom:15px;border-radius:10px;outline:0;box-sizing:border-box;text-align:center;font-weight:700}button{width:100%;background:#4ade80;color:#000;font-weight:700;padding:14px;border:none;border-radius:10px;cursor:pointer;text-transform:uppercase;box-shadow:0 0 15px #4ade80;transition:0.3s}button:active{transform:scale(0.95)}</style></head><body><div class="card"><div class="title">ADMIN GENERATOR</div><input type="text" id="k" placeholder="KETIK SANDI CUSTOM"><select id="d"><option value="1">DURASI: 1 HARI</option><option value="7">DURASI: 7 HARI</option><option value="30">DURASI: 30 HARI</option></select><button onclick="buat()">AKTIFKAN SANDI ✅</button></div><script>async function buat(){const k=document.getElementById("k").value,d=document.getElementById("d").value;if(!k)return alert("Isi Sandi!");try{const r=await fetch("https://script.google.com/macros/s/AKfycbxHxZrOoYE3IAtQbBQybN-cj_X2wzCt6OuQ3rvHck5XxfUG50oDTB2wGafkjyp4K-t7KQ/exec?action=saveKey&key="+k+"&days="+d);const t=await r.text();alert(t)}catch(e){alert("Error: Pastikan Apps Script sudah Versi Baru & Anyone!")}}</script></body></html>
